# dkms-verifier targets — Ubuntu KMI baselines to compare against.
#
# Format (TSV, # for comments):
#   <id>      <kernel-version>          <description>
#
# <id> is also the directory name under targets/<id>/staged/ that scripts
# look for (Module.symvers, optional vmlinux).
#
# To add a new Canonical release:
#   1. Append a line below.
#   2. Run: make refresh-targets
#   3. Re-run: make release TAG=...
#
# Notes:
# - Pin a specific minor (e.g. 6.8.0-31-generic) so reports are reproducible.
#   Bump the pin deliberately when Canonical advances HWE/GA.
# - linux-image-unsigned-<ver>-dbgsym is needed only for kmidiff (type-level)
#   not for the CRC layer. fetch_ubuntu_kernel.sh handles missing dbgsym.

ubuntu-24.04-ga       6.8.0-31-generic       Ubuntu 24.04 GA (kernel 6.8)
ubuntu-24.04-hwe      6.17.0-23-generic      Ubuntu 24.04 HWE (kernel 6.17)
